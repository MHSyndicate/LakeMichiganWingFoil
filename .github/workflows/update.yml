name: Update conditions

on:
  schedule:
    - cron: "0 11 * * *"    # 06:00 CDT (UTC-5). Cron is UTC-only; adjust to taste.
  workflow_dispatch:         # adds a "Run workflow" button for manual/testing runs

permissions:
  contents: write            # required so the job can commit the regenerated page

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python generate.py
      - name: Commit updated page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html report.md
          git diff --staged --quiet || git commit -m "Update conditions ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
